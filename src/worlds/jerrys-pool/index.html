<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jerry's Pool</title>
    <link rel="stylesheet" href="./site.css?v=vake-2" />
  </head>
  <body>
    <div id="sea-mounts" aria-hidden="true">
      <i class="sea-mount mount-a"></i>
      <i class="sea-mount mount-b"></i>
      <i class="sea-mount mount-c"></i>
      <i class="sea-mount mount-d"></i>
      <i class="sea-mount mount-e"></i>
      <i class="sea-mount mount-f"></i>
      <i class="sea-mount mount-g"></i>
      <i class="sea-mount mount-h"></i>
      <i class="sea-mount mount-i"></i>
    </div>
    <div id="ambient-wash" aria-hidden="true"></div>
    <div id="ambient-blooms" aria-hidden="true"></div>
    <div id="ambient-shapes" aria-hidden="true"></div>
    <div id="distant-shadow" aria-hidden="true"></div>
    <canvas id="field" aria-hidden="true"></canvas>
    <canvas id="dot-field" aria-hidden="true"></canvas>
    <div class="noise" aria-hidden="true"></div>
    <div id="denizen-field" aria-hidden="true">
      <i class="pool-polyp polyp-a"></i>
      <i class="pool-polyp polyp-b"></i>
      <i class="pool-polyp polyp-c"></i>
      <i class="pool-polyp polyp-d"></i>
    </div>
    <div id="fish-model-gallery" aria-hidden="true">
      <svg class="alien-fish fish-chain" viewBox="0 0 112 64">
        <path class="fish-body fish-segment segment-a" d="M18 32 34 17 50 32 34 47Z"></path>
        <path class="fish-body fish-segment segment-b" d="M43 32 58 19 73 32 58 45Z"></path>
        <path class="fish-body fish-segment segment-c" d="M67 32 81 21 95 32 81 43Z"></path>
        <path class="fish-tail" d="M94 32 109 20 106 32 109 44Z"></path>
        <circle class="fish-sensor" cx="27" cy="28" r="2.4"></circle>
      </svg>
      <svg class="alien-fish fish-tripod" viewBox="0 0 92 78">
        <circle class="fish-body" cx="46" cy="27" r="14"></circle>
        <circle class="fish-sensor" cx="41" cy="24" r="2.6"></circle>
        <circle class="fish-sensor secondary" cx="51" cy="24" r="2.1"></circle>
        <path class="fish-limb" d="M39 38 Q24 50 20 70"></path>
        <path class="fish-limb" d="M46 40 Q46 56 45 73"></path>
        <path class="fish-limb" d="M53 38 Q68 50 72 70"></path>
      </svg>
    </div>
    <div id="foreground-polyps" aria-hidden="true"></div>
    <div id="energy-field"></div>
    <div class="orbital">
      <div class="orb" id="jerry">
        <span class="organelle nucleus-core"></span>
        <span class="organelle vesicle vesicle-a"></span>
        <span class="organelle vesicle vesicle-b"></span>
        <span class="organelle filament-core"></span>
        <span class="organelle mitochondrion mitochondrion-a"></span>
        <span class="organelle mitochondrion mitochondrion-b"></span>
        <span class="organelle mitochondrion mitochondrion-c"></span>
        <span class="organelle golgi-body"></span>
        <span class="organelle ribosome-cloud"></span>
        <span class="organelle alien-crystal"></span>
        <span class="organelle alien-seed"></span>
        <span class="organelle alien-void"></span>
        <span class="organelle dark-organelle dark-organelle-a"></span>
        <span class="organelle dark-organelle dark-organelle-b"></span>
        <span class="organelle dark-organelle dark-organelle-c"></span>
        <span class="organelle dark-organelle dark-organelle-d"></span>
        <span class="organelle dark-organelle dark-organelle-e"></span>
      </div>
      <div class="ring ring-a"></div>
      <div class="ring ring-b"></div>
      <div class="ring ring-c"></div>
    </div>
    <canvas id="filament-field" aria-hidden="true"></canvas>
    <script src="../../core/world-registry.js"></script>
    <script src="../../core/drift.js"></script>
    <script src="../../core/sound-control.js"></script>
    <script src="../../../assets/the plasma pool — pixi_files/pixi.min.js?v=8.19.0"></script>
    <script src="./site.js?v=vake-2" defer></script>
  </body>
</html>
